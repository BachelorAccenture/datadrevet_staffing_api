# ──────────────────────────────────────────────
# Docker-specific Spring profile
# ──────────────────────────────────────────────
spring:
  neo4j:
    uri: ${NEO4J_URI:bolt://neo4j:7687}
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:password}

server:
  port: 8080

logging:
  level:
    com.accenture.staffing: INFO
    org.springframework.data.neo4j: WARN